<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ساندويش حنيفة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green:  #3D8B6E;
    --green3: #236147;
    --cream:  #F5E6C8;
    --cream2: #EDD9A3;
    --border: rgba(245,230,200,0.18);
    --card:   rgba(25,75,52,0.92);
  }
  body { font-family: 'Tajawal', sans-serif; background: var(--green); color: var(--cream); min-height: 100vh; }
  .hero { background: var(--green3); padding: 36px 20px 28px; text-align: center; border-bottom: 2px solid rgba(237,217,163,0.3); }
  .hero h1 { font-size: 2.4rem; font-weight: 900; color: var(--cream2); letter-spacing: -1px; }
  .hero p  { color: rgba(245,230,200,0.6); font-size: 0.95rem; margin-top: 6px; }
  .container { max-width: 900px; margin: 0 auto; padding: 22px 14px; }
  .sec-title { font-size: 1.1rem; font-weight: 800; color: var(--cream2); margin-bottom: 13px; display: flex; align-items: center; gap: 8px; }
  .sec-title::after { content:''; flex:1; height:1px; background:var(--border); }
  .cat-tabs { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:16px; scrollbar-width:none; }
  .cat-tabs::-webkit-scrollbar { display:none; }
  .cat-tab { flex-shrink:0; padding:7px 15px; border-radius:30px; border:1.5px solid var(--border); background:rgba(255,255,255,0.07); color:rgba(245,230,200,0.55); font-family:'Tajawal',sans-serif; font-size:0.86rem; font-weight:700; cursor:pointer; transition:all .2s; white-space:nowrap; }
  .cat-tab.active { border-color:var(--cream2); background:var(--cream2); color:var(--green3); }
  .cat-tab:hover:not(.active) { border-color:var(--cream); color:var(--cream); }
  .menu-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(228px,1fr)); gap:11px; margin-bottom:26px; }
  .menu-card { background:var(--card); border:1.5px solid var(--border); border-radius:13px; padding:15px; cursor:pointer; transition:all .2s; position:relative; user-select:none; }
  .menu-card:hover { border-color:var(--cream2); transform:translateY(-2px); }
  .menu-card.selected { border-color:var(--cream2); background:rgba(237,200,80,0.12); }
  .item-name { font-size:0.95rem; font-weight:700; color:#fff; }
  .item-desc { font-size:0.78rem; color:rgba(245,230,200,0.6); margin-top:3px; line-height:1.4; }
  .item-price { font-size:1rem; font-weight:900; color:var(--cream2); margin-top:9px; }
  .add-badge { position:absolute; top:9px; left:9px; background:var(--cream2); color:var(--green3); font-size:0.65rem; font-weight:900; padding:2px 7px; border-radius:20px; opacity:0; transition:opacity .2s; }
  .menu-card.selected .add-badge { opacity:1; }
  .cart-instances { display:flex; flex-direction:column; gap:8px; margin-top:10px; }
  .cart-instance { background:rgba(0,0,0,0.2); border:1px solid var(--border); border-radius:10px; padding:10px 12px; }
  .instance-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .instance-num { font-size:0.75rem; color:var(--cream2); font-weight:700; }
  .instance-del { background:rgba(232,52,10,0.25); border:1px solid rgba(232,52,10,0.4); color:#ff7755; font-size:0.72rem; font-weight:700; padding:2px 8px; border-radius:20px; cursor:pointer; font-family:'Tajawal',sans-serif; }
  .instance-del:hover { background:rgba(232,52,10,0.5); }
  .addon-row { display:flex; align-items:center; gap:7px; margin-bottom:4px; }
  .addon-row label { font-size:0.8rem; color:rgba(245,230,200,0.85); font-weight:600; cursor:pointer; display:flex; align-items:center; gap:5px; }
  .addon-row input[type=checkbox] { accent-color:var(--cream2); width:14px; height:14px; cursor:pointer; flex-shrink:0; }
  .addon-row select { flex:1; background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:7px; padding:5px 8px; color:var(--cream); font-family:'Tajawal',sans-serif; font-size:0.8rem; outline:none; }
  .item-note-input { width:100%; background:rgba(0,0,0,0.22); border:1px solid var(--border); border-radius:7px; padding:6px 9px; color:var(--cream); font-family:'Tajawal',sans-serif; font-size:0.8rem; outline:none; margin-top:4px; }
  .item-note-input::placeholder { color:rgba(245,230,200,0.35); }
  .item-note-input:focus { border-color:var(--cream2); }
  .add-instance-btn { display:flex; align-items:center; justify-content:center; gap:6px; margin-top:8px; padding:7px; background:rgba(237,217,163,0.08); border:1.5px dashed rgba(237,217,163,0.3); border-radius:9px; color:var(--cream2); font-family:'Tajawal',sans-serif; font-size:0.82rem; font-weight:700; cursor:pointer; width:100%; transition:all .2s; }
  .add-instance-btn:hover { background:rgba(237,217,163,0.15); border-color:var(--cream2); }
  .simple-item-ctrl { display:flex; align-items:center; gap:8px; margin-top:10px; }
  .qty-btn { width:27px; height:27px; border-radius:50%; border:1.5px solid var(--cream2); background:transparent; color:var(--cream2); font-size:1.1rem; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; line-height:1; }
  .qty-btn:hover { background:var(--cream2); color:var(--green3); }
  .qty-num { font-size:0.95rem; font-weight:700; color:#fff; min-width:18px; text-align:center; }
  .remove-all-btn { margin-right:auto; background:rgba(232,52,10,0.2); border:1px solid rgba(232,52,10,0.35); color:#ff7755; font-size:0.7rem; font-weight:700; padding:2px 9px; border-radius:20px; cursor:pointer; font-family:'Tajawal',sans-serif; }
  .remove-all-btn:hover { background:rgba(232,52,10,0.45); }
  .order-form { background:var(--card); border-radius:13px; padding:18px; border:1px solid var(--border); margin-bottom:18px; }
  .field { margin-bottom:13px; }
  .field:last-child { margin-bottom:0; }
  .field label { display:block; font-size:0.8rem; font-weight:700; color:rgba(245,230,200,0.55); margin-bottom:5px; }
  .field input, .field select, .field textarea { width:100%; background:rgba(0,0,0,0.25); border:1.5px solid var(--border); border-radius:9px; padding:10px 12px; color:var(--cream); font-family:'Tajawal',sans-serif; font-size:0.9rem; outline:none; transition:border-color .2s; }
  .field input::placeholder, .field textarea::placeholder { color:rgba(245,230,200,0.3); }
  .field input:focus, .field select:focus, .field textarea:focus { border-color:var(--cream2); }
  .field textarea { resize:vertical; min-height:65px; }
  .field select option { background:#236147; }
  .fee-note { font-size:0.78rem; color:var(--cream2); margin-top:5px; font-weight:600; min-height:17px; }
  .delivery-toggle { display:flex; gap:10px; margin-bottom:22px; }
  .dtog-btn { flex:1; padding:12px; border-radius:11px; border:1.5px solid var(--border); background:rgba(255,255,255,0.05); color:rgba(245,230,200,0.5); font-family:'Tajawal',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; text-align:center; }
  .dtog-btn.active { border-color:var(--cream2); background:rgba(237,200,80,0.13); color:var(--cream2); }
  .summary-box { background:var(--card); border:1.5px solid var(--border); border-radius:13px; padding:16px; margin-bottom:16px; }
  .summary-empty { color:rgba(245,230,200,0.35); font-size:0.86rem; text-align:center; padding:8px 0; }
  .summary-item { display:flex; justify-content:space-between; align-items:flex-start; padding:7px 0; border-bottom:1px solid var(--border); font-size:0.86rem; gap:8px; }
  .summary-item:last-child { border-bottom:none; }
  .s-name { color:rgba(245,230,200,0.88); line-height:1.5; }
  .s-price { color:var(--cream2); font-weight:700; white-space:nowrap; }
  .fee-row { display:flex; justify-content:space-between; margin-top:8px; font-size:0.86rem; color:rgba(245,230,200,0.55); }
  .total-row { display:flex; justify-content:space-between; margin-top:11px; padding-top:11px; border-top:1.5px solid rgba(237,217,163,0.4); font-size:1.1rem; font-weight:900; color:var(--cream2); }
  .min-warn { display:none; margin-top:10px; padding:9px 12px; background:rgba(232,52,10,0.18); border:1px solid rgba(232,52,10,0.4); border-radius:9px; color:#ff8866; font-size:0.84rem; font-weight:700; text-align:center; }
  .whatsapp-btn { width:100%; background:#25D366; color:#fff; border:none; border-radius:13px; padding:16px; font-family:'Tajawal',sans-serif; font-size:1.08rem; font-weight:900; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:9px; transition:all .2s; margin-bottom:9px; }
  .whatsapp-btn:hover { background:#1ebe5d; transform:translateY(-2px); box-shadow:0 8px 22px rgba(37,211,102,.28); }
  .whatsapp-btn svg { width:21px; height:21px; }
  .note { color:rgba(245,230,200,0.35); font-size:0.76rem; text-align:center; margin-bottom:28px; }
  .toast { position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--green3); border:1.5px solid var(--cream2); color:var(--cream); padding:12px 20px; border-radius:40px; font-size:0.9rem; font-weight:700; transition:transform .3s; z-index:999; white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="hero">
  <h1>ساندويش حنيفة</h1>
  <p>حي البلدية — حفر الباطن</p>
</div>

<div class="container">
  <div class="sec-title">المنيو</div>
  <div class="cat-tabs" id="catTabs"></div>
  <div class="menu-grid" id="menuGrid"></div>

  <div class="sec-title">نوع الطلب</div>
  <div class="delivery-toggle">
    <button class="dtog-btn active" id="btnPickup" onclick="setDeliveryMode('pickup')">استلام من المطعم</button>
    <button class="dtog-btn" id="btnDelivery" onclick="setDeliveryMode('delivery')">توصيل</button>
  </div>

  <div class="sec-title">بيانات الطلب</div>
  <div class="order-form">
    <div class="field">
      <label>الاسم</label>
      <input type="text" id="custName" placeholder="اسمك الكريم">
    </div>
    <div id="deliveryFields" style="display:none">
      <div class="field">
        <label>رقم الجوال</label>
        <input type="tel" id="custPhone" placeholder="05xxxxxxxx">
      </div>
      <div class="field">
        <label>الحي</label>
        <select id="custArea" onchange="updateDeliveryFee()">
          <option value="">-- اختر الحي --</option>
          <optgroup label="توصيل 4 ريال">
            <option value="البلدية|4">البلدية</option>
            <option value="الباطن|4">الباطن</option>
            <option value="الخالدية|4">الخالدية</option>
            <option value="المحمدية|4">المحمدية</option>
            <option value="العزيزية|4">العزيزية</option>
            <option value="القصير|4">القصير</option>
            <option value="فليج|4">فليج</option>
            <option value="المروج|4">المروج</option>
            <option value="المصيف|4">المصيف</option>
          </optgroup>
          <optgroup label="توصيل 6 ريال">
            <option value="أبو موسى الأشعري|6">أبو موسى الأشعري</option>
            <option value="الصفا|6">الصفا</option>
            <option value="الواحة|6">الواحة</option>
          </optgroup>
          <optgroup label="توصيل 8 ريال">
            <option value="الفيصلية|8">الفيصلية</option>
            <option value="النايفية|8">النايفية</option>
            <option value="الفيحاء|8">الفيحاء</option>
            <option value="الوادي|8">الوادي</option>
            <option value="الربوة|8">الربوة</option>
            <option value="التلال|8">التلال</option>
          </optgroup>
        </select>
        <div class="fee-note" id="deliveryFeeNote"></div>
      </div>
      <div class="field">
        <label>العنوان التفصيلي</label>
        <textarea id="custAddress" placeholder="مثال: شارع الأمير عبدالله، بجانب صيدلية النور"></textarea>
      </div>
    </div>
    <div class="field" style="margin-bottom:0">
      <label>ملاحظات عامة (اختياري)</label>
      <input type="text" id="custNotes" placeholder="أي ملاحظة إضافية...">
    </div>
  </div>

  <div class="sec-title">ملخص الطلب</div>
  <div class="summary-box">
    <div class="summary-empty" id="summaryEmpty">لم تختر أي وجبة بعد</div>
    <div id="summaryItems"></div>
    <div id="minOrderWarn" class="min-warn"></div>
    <div id="feeRow" class="fee-row" style="display:none">
      <span>رسوم التوصيل</span>
      <span id="feeAmt" style="color:var(--cream2);font-weight:700"></span>
    </div>
    <div class="total-row" id="totalRow" style="display:none">
      <span>الإجمالي</span><span id="totalPrice"></span>
    </div>
  </div>

  <button class="whatsapp-btn" onclick="sendOrder()">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.555 4.118 1.528 5.845L0 24l6.306-1.502A11.954 11.954 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.005-1.371l-.359-.214-3.723.887.923-3.616-.234-.371A9.818 9.818 0 1112 21.818z"/></svg>
    أرسل الطلب عبر واتساب
  </button>
  <p class="note">سيتم فتح واتساب تلقائياً مع تفاصيل طلبك</p>
</div>
<div class="toast" id="toast"></div>

<script>
const PHONE = '966506295784';

const CATEGORIES = [
  {id:'shawarma', name:'شاورما'},
  {id:'burger',   name:'برغر'},
  {id:'sandwiches',name:'ساندويشات'},
  {id:'fries',    name:'فرايز'},
  {id:'drinks',   name:'مشروبات'}
];

const MENU = [
  {id:1, cat:'shawarma',   name:'شاورما صغير',          nameEn:'Small Shawarma',          desc:'شاورما صغيرة طازجة',                                                                    price:6},
  {id:2, cat:'shawarma',   name:'شاورما صاروخ',          nameEn:'Large Shawarma',           desc:'شاورما كبيرة تشبع وتزيد',                                                               price:12},
  {id:3, cat:'shawarma',   name:'شاورما عربي',            nameEn:'Arabic Shawarma',          desc:'شاورما + جبن ذائب + بطاطس + صوصات سرية',                                               price:18},
  {id:4, cat:'shawarma',   name:'شاورما تركي كرسبي',     nameEn:'Turkish Crispy Shawarma',  desc:'صوص إكسندر + تتبيلة تركية خاصة',                                                       price:15},
  {id:5, cat:'burger',     name:'برغر دجاج كلاسيك',      nameEn:'Classic Chicken Burger',   desc:'دجاج كرسبي + خبز برتزيل + شيدر أمريكي + خس + مخلل + صوصين خاصين',                    price:16, hasMeal:true, mealPrice:23},
  {id:6, cat:'burger',     name:'برغر لحم كلاسيك',       nameEn:'Classic Beef Burger',      desc:'لحم روسي كرسبي + خبز برتزيل + شيدر أمريكي + خس + مخلل + صوصين خاصين',               price:16, hasMeal:true, mealPrice:23},
  {id:7, cat:'burger',     name:'برغر لحم عادي',          nameEn:'Regular Beef Burger',      desc:'شريحة لحم + مايونيز + خس + جبن شيدر',                                                  price:9,  hasMeal:true, mealPrice:17},
  {id:8, cat:'burger',     name:'برغر دجاج عادي',         nameEn:'Regular Chicken Burger',   desc:'شريحة دجاج + مايونيز + خس + جبن شيدر',                                                 price:8,  hasMeal:true, mealPrice:16},
  {id:9, cat:'sandwiches', name:'كباب لحم',               nameEn:'Beef Kebab Sandwich',      desc:'ساندويش كباب لحم طازج ومشوي',                                                           price:8},
  {id:10,cat:'sandwiches', name:'شيش طاووق',              nameEn:'Shish Tawook Sandwich',    desc:'ساندويش شيش طاووق مشوي بتتبيلة مميزة',                                                  price:7},
  {id:11,cat:'fries',      name:'فرايز عادي',             nameEn:'Regular Fries',            desc:'بطاطس مقرمشة طازجة',                                                                    price:6,  hasSauce:true},
  {id:12,cat:'fries',      name:'فرايز تشيكن',            nameEn:'Chicken Fries',            desc:'بطاطس مع قطع دجاج مقرمشة',                                                              price:10, hasSauce:true},
  {id:13,cat:'drinks',     name:'حمضيات',                 nameEn:'Citrus Juice',             desc:'عصير حمضيات منعش',                                                                      price:3},
  {id:14,cat:'drinks',     name:'ببسي',                   nameEn:'Pepsi',                    desc:'ببسي بارد',                                                                              price:3},
  {id:15,cat:'drinks',     name:'ديو',                    nameEn:'Mountain Dew',             desc:'ماونتن ديو بارد',                                                                        price:3},
  {id:16,cat:'drinks',     name:'ماء',                    nameEn:'Water',                    desc:'ماء معدني',                                                                              price:0.5}
];

const DRINK_OPTIONS = ['حمضيات','ببسي','ديو'];
const AREA_EN = {
  'البلدية':'Al-Baladiya','الباطن':'Al-Batin','الخالدية':'Al-Khalidiya',
  'المحمدية':'Al-Muhammadiya','العزيزية':'Al-Aziziya','القصير':'Al-Qusayr',
  'فليج':'Fulaij','المروج':'Al-Muruj','المصيف':'Al-Masif',
  'أبو موسى الأشعري':'Abu Musa Al-Ashari','الصفا':'Al-Safa','الواحة':'Al-Waha',
  'الفيصلية':'Al-Faysaliya','النايفية':'Al-Nayfiya','الفيحاء':'Al-Fayha',
  'الوادي':'Al-Wadi','الربوة':'Al-Rabwa','التلال':'Al-Tilal'
};

let activeCategory = 'shawarma';
let deliveryMode   = 'pickup';
let deliveryFee    = 0;
let cart           = {};

/* ───── وضع الطلب ───── */
function setDeliveryMode(m) {
  deliveryMode = m;
  document.getElementById('btnPickup').classList.toggle('active', m === 'pickup');
  document.getElementById('btnDelivery').classList.toggle('active', m === 'delivery');
  document.getElementById('deliveryFields').style.display = m === 'delivery' ? 'block' : 'none';
  if (m === 'pickup') deliveryFee = 0;
  renderSummary();
}

function updateDeliveryFee() {
  const sel = document.getElementById('custArea').value;
  if (!sel) { deliveryFee = 0; document.getElementById('deliveryFeeNote').textContent = ''; renderSummary(); return; }
  const fee = parseInt(sel.split('|')[1]);
  deliveryFee = fee;
  const lbl = {4:'قريب', 6:'متوسط', 8:'بعيد'};
  document.getElementById('deliveryFeeNote').textContent = (lbl[fee]||'') + ' — رسوم التوصيل: ' + fee + ' ريال';
  renderSummary();
}

/* ───── تبويبات الأصناف ───── */
function renderTabs() {
  document.getElementById('catTabs').innerHTML = CATEGORIES.map(c =>
    `<button class="cat-tab ${c.id === activeCategory ? 'active' : ''}" onclick="setCategory('${c.id}')">${c.name}</button>`
  ).join('');
}
function setCategory(id) { activeCategory = id; renderTabs(); renderMenu(); }

/* ───── بناء صندوق خيارات النسخة ───── */
function mkInstance(itemId, idx) {
  const item = MENU.find(m => m.id === itemId);
  const inst = cart[itemId][idx];
  const { isMeal, drink, wantSauce, note } = inst;
  const total = cart[itemId].length;

  let rows = '';
  if (item.hasMeal) {
    const ex = item.mealPrice - item.price;
    rows += `<div class="addon-row"><label style="color:var(--cream2)"><input type="checkbox" ${isMeal ? 'checked' : ''} onchange="setInstMeal(${itemId},${idx},this.checked)">وجبة (+${ex} ريال) فرايز+مشروب</label></div>`;
    if (isMeal) {
      rows += `<div class="addon-row"><span style="font-size:.76rem;color:#5cd6a0;flex-shrink:0">فرايز بصوص مجاناً&nbsp;</span><select onchange="setInstDrink(${itemId},${idx},this.value)" onclick="event.stopPropagation()"><option value="">-- المشروب --</option>${DRINK_OPTIONS.map(d => `<option ${drink === d ? 'selected' : ''}>${d}</option>`).join('')}</select></div>`;
    }
  }
  if (item.hasSauce || isMeal) {
    rows += `<div class="addon-row"><label style="color:#5cd6a0"><input type="checkbox" ${wantSauce ? 'checked' : ''} onchange="setInstSauce(${itemId},${idx},this.checked)">صوص مجاناً</label></div>`;
  }
  rows += `<input class="item-note-input" type="text" placeholder="ملاحظة (اختياري)" value="${note.replace(/"/g,'&quot;')}" oninput="setInstNote(${itemId},${idx},this.value)" onclick="event.stopPropagation()">`;

  return `<div class="cart-instance">
    <div class="instance-header">
      <span class="instance-num">${total > 1 ? 'طلب ' + (idx + 1) : ''}</span>
      <button class="instance-del" onclick="removeInst(${itemId},${idx});event.stopPropagation()">حذف</button>
    </div>
    ${rows}
  </div>`;
}

/* ───── عرض المنيو ───── */
function renderMenu() {
  const items = MENU.filter(m => m.cat === activeCategory);
  document.getElementById('menuGrid').innerHTML = items.map(item => {
    const insts = cart[item.id] || [];
    const qty   = insts.length;
    let instsHTML = '';

    if (qty > 0) {
      if (!item.hasMeal && !item.hasSauce) {
        instsHTML = `<div class="simple-item-ctrl" onclick="event.stopPropagation()">
          <button class="qty-btn" onclick="removeInst(${item.id},${qty-1})">−</button>
          <span class="qty-num">${qty}</span>
          <button class="qty-btn" onclick="addInst(${item.id})">+</button>
          <button class="remove-all-btn" onclick="removeAll(${item.id})">حذف الكل</button>
        </div>
        <input class="item-note-input" type="text" placeholder="ملاحظة (اختياري)" value="${(cart[item.id][0]?.note||'').replace(/"/g,'&quot;')}" oninput="setInstNote(${item.id},0,this.value)" onclick="event.stopPropagation()">`;
      } else {
        instsHTML = `<div class="cart-instances" onclick="event.stopPropagation()">${insts.map((_,i) => mkInstance(item.id, i)).join('')}</div>`;
        instsHTML += `<button class="add-instance-btn" onclick="addInst(${item.id});event.stopPropagation()">+ أضف نسخة بخيارات مختلفة</button>`;
      }
    }

    return `<div class="menu-card ${qty > 0 ? 'selected' : ''}" onclick="handleCardClick(${item.id})">
      <div class="add-badge">مضاف</div>
      <div class="item-name">${item.name}</div>
      <div class="item-desc">${item.desc}</div>
      <div class="item-price">${item.price} ريال${item.hasMeal ? ` <span style="color:rgba(245,230,200,.4);font-size:.7rem">/ وجبة ${item.mealPrice} ريال</span>` : ''}</div>
      ${instsHTML}
    </div>`;
  }).join('');
}

/* ───── إدارة السلة ───── */
function addInst(id) {
  if (!cart[id]) cart[id] = [];
  const item = MENU.find(m => m.id === id);
  // للأصناف البسيطة: نسخ الملاحظة من النسخة الأولى
  const existingNote = (!item.hasMeal && !item.hasSauce && cart[id][0]) ? cart[id][0].note : '';
  cart[id].push({isMeal:false, drink:'', wantSauce:false, note: existingNote});
  renderMenu(); renderSummary();
}
function removeInst(id, idx) {
  if (!cart[id]) return;
  cart[id].splice(idx, 1);
  if (cart[id].length === 0) delete cart[id];
  renderMenu(); renderSummary();
}
function removeAll(id) { delete cart[id]; renderMenu(); renderSummary(); }
function setInstMeal(id, idx, v)  { if(cart[id]&&cart[id][idx]){ cart[id][idx].isMeal=v; if(!v){cart[id][idx].drink='';cart[id][idx].wantSauce=false;} renderMenu(); renderSummary(); } }
function setInstDrink(id, idx, v) { if(cart[id]&&cart[id][idx]){ cart[id][idx].drink=v; renderSummary(); } }
function setInstSauce(id, idx, v) { if(cart[id]&&cart[id][idx]){ cart[id][idx].wantSauce=v; renderSummary(); } }
function setInstNote(id, idx, v)  { if(cart[id]&&cart[id][idx])  cart[id][idx].note=v; }
function handleCardClick(id) { if (!cart[id] || cart[id].length === 0) addInst(id); }

/* ───── تجميع النسخ المتطابقة ───── */
function groupInsts(insts) {
  const groups = [];
  insts.forEach(inst => {
    const k = JSON.stringify({isMeal:inst.isMeal, drink:inst.drink, wantSauce:inst.wantSauce, note:inst.note});
    const found = groups.find(g => g.key === k);
    if (found) found.qty++;
    else groups.push({key:k, inst, qty:1});
  });
  return groups;
}

/* ───── ملخص الطلب ───── */
function renderSummary() {
  const entries = Object.entries(cart);
  const empty   = document.getElementById('summaryEmpty');
  const si      = document.getElementById('summaryItems');
  const tr      = document.getElementById('totalRow');
  const fr      = document.getElementById('feeRow');
  const mw      = document.getElementById('minOrderWarn');

  if (!entries.length) {
    empty.style.display = 'block';
    si.innerHTML = '';
    tr.style.display = 'none';
    fr.style.display = 'none';
    mw.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  tr.style.display = 'flex';
  let sub = 0;

  si.innerHTML = entries.flatMap(([id, insts]) => {
    const item   = MENU.find(m => m.id == id);
    const groups = groupInsts(insts);
    return groups.map(({inst, qty}) => {
      const up    = inst.isMeal ? item.mealPrice : item.price;
      const total = up * qty; sub += total;
      let lbl = '';
      if (inst.isMeal) lbl = 'وجبة' + (inst.drink ? ' - ' + inst.drink : '') + ' + فرايز' + (inst.wantSauce ? ' بصوص' : '');
      else if (inst.wantSauce) lbl = 'صوص مجاني';
      let nameStr = item.name + (qty > 1 ? ' x' + qty : '');
      let subStr  = lbl ? `<br><span style="font-size:.75rem;color:rgba(245,230,200,.55)">${lbl}</span>` : '';
      if (inst.note) subStr += `<br><span style="font-size:.73rem;color:rgba(245,230,200,.4)">ملاحظة: ${inst.note}</span>`;
      return `<div class="summary-item"><span class="s-name">${nameStr}${subStr}</span><span class="s-price">${total} ريال</span></div>`;
    });
  }).join('');

  const fee = deliveryMode === 'delivery' ? deliveryFee : 0;
  if (fee > 0) { fr.style.display = 'flex'; document.getElementById('feeAmt').textContent = fee + ' ريال'; }
  else fr.style.display = 'none';

  if (deliveryMode === 'delivery' && sub < 35 && sub > 0) {
    mw.style.display = 'block';
    mw.textContent   = 'يحتاج ' + (35 - sub).toFixed(1) + ' ريال إضافية للوصول للحد الأدنى (35 ريال)';
  } else {
    mw.style.display = 'none';
  }

  document.getElementById('totalPrice').textContent = (sub + fee) + ' ريال';
}

/* ───── بناء أسطر الطلب ───── */
function buildLines(lang) {
  let lines = '', sub = 0;
  Object.entries(cart).forEach(([id, insts]) => {
    const item   = MENU.find(m => m.id == id);
    const groups = groupInsts(insts);
    groups.forEach(({inst, qty}) => {
      const up    = inst.isMeal ? item.mealPrice : item.price;
      const total = up * qty; sub += total;
      let l;
      if (lang === 'ar') {
        l = '• ' + item.name + (qty > 1 ? ' x' + qty : '');
        if (inst.isMeal) l += ' (وجبة - ' + inst.drink + ' + فرايز' + (inst.wantSauce ? ' بصوص مجاني' : '') + ')';
        else if (inst.wantSauce) l += ' + صوص مجاني';
        l += ' = ' + total + ' ريال';
        if (inst.note) l += ' | ملاحظة: ' + inst.note;
      } else {
        const drinkEn = MENU.find(m => m.name === inst.drink)?.nameEn || inst.drink;
        l = '• ' + (item.nameEn || item.name) + (qty > 1 ? ' x' + qty : '');
        if (inst.isMeal) l += ' (Meal - ' + drinkEn + ' + Fries' + (inst.wantSauce ? ' with sauce' : '') + ')';
        else if (inst.wantSauce) l += ' + Free sauce';
        l += ' = ' + total + ' SAR';
        if (inst.note) l += ' | Note: ' + inst.note;
      }
      lines += l + '\n';
    });
  });
  return { lines, sub };
}

/* ───── ترجمة عبر Google ───── */
async function translateToEn(text) {
  if (!text || !text.trim()) return text;
  try {
    const url = 'https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=ar|en';
    const r   = await fetch(url);
    const d   = await r.json();
    if (d.responseStatus === 200 && d.responseData && d.responseData.translatedText) {
      return d.responseData.translatedText;
    }
    return text;
  } catch(e) { return text; }
}

/* ───── إرسال الطلب ───── */
async function sendOrder() {
  const name = document.getElementById('custName').value.trim();
  if (!name) { showToast('الرجاء إدخال الاسم'); return; }

  let phone = '', areaRaw = '', address = '';
  if (deliveryMode === 'delivery') {
    phone   = document.getElementById('custPhone').value.trim();
    areaRaw = document.getElementById('custArea').value;
    address = document.getElementById('custAddress').value.trim();
    if (!phone)   { showToast('الرجاء إدخال رقم الجوال'); return; }
    if (!areaRaw) { showToast('الرجاء اختيار الحي'); return; }
    if (!address) { showToast('الرجاء إدخال العنوان التفصيلي'); return; }
  }

  if (!Object.keys(cart).length) { showToast('اختر وجبة على الأقل'); return; }

  if (deliveryMode === 'delivery') {
    const { sub } = buildLines('ar');
    if (sub < 35) { showToast('الحد الأدنى للتوصيل 35 ريال — طلبك ' + sub + ' ريال', 5000); return; }
  }

  for (const [id, insts] of Object.entries(cart)) {
    for (let i = 0; i < insts.length; i++) {
      if (insts[i].isMeal && !insts[i].drink) {
        const item = MENU.find(m => m.id == id);
        showToast('اختر مشروب الوجبة لـ "' + item.name + '"'); return;
      }
    }
  }

  showToast('جاري تجهيز الطلب...');

  const notes  = document.getElementById('custNotes').value.trim();
  const area   = areaRaw ? areaRaw.split('|')[0] : '';
  const areaEn = AREA_EN[area] || area;
  const fee    = deliveryMode === 'delivery' ? deliveryFee : 0;

  // جمع كل الملاحظات الفردية وترجمتها
  const noteTexts = [];
  Object.entries(cart).forEach(([id, insts]) => {
    groupInsts(insts).forEach(({inst}) => {
      noteTexts.push(inst.note || '');
    });
  });
  const translatedNotes = await Promise.all(noteTexts.map(n => translateToEn(n)));

  // بناء أسطر الطلب مع الملاحظات المترجمة
  let arLines = '', enLines = '', sub = 0;
  let noteIdx = 0;
  Object.entries(cart).forEach(([id, insts]) => {
    const item   = MENU.find(m => m.id == id);
    const groups = groupInsts(insts);
    groups.forEach(({inst, qty}) => {
      const up    = inst.isMeal ? item.mealPrice : item.price;
      const total = up * qty; sub += total;
      const noteEn = translatedNotes[noteIdx++];
      const drinkEn = MENU.find(m => m.name === inst.drink)?.nameEn || inst.drink;

      let ar = '• ' + item.name + (qty > 1 ? ' x' + qty : '');
      if (inst.isMeal) ar += ' (وجبة - ' + inst.drink + ' + فرايز' + (inst.wantSauce ? ' بصوص مجاني' : '') + ')';
      else if (inst.wantSauce) ar += ' + صوص مجاني';
      ar += ' = ' + total + ' ريال';
      if (inst.note) ar += ' | ملاحظة: ' + inst.note;
      arLines += ar + '\n';

      let en = '• ' + (item.nameEn || item.name) + (qty > 1 ? ' x' + qty : '');
      if (inst.isMeal) en += ' (Meal - ' + drinkEn + ' + Fries' + (inst.wantSauce ? ' with sauce' : '') + ')';
      else if (inst.wantSauce) en += ' + Free sauce';
      en += ' = ' + total + ' SAR';
      if (noteEn) en += ' | Note: ' + noteEn;
      enLines += en + '\n';
    });
  });

  const total  = sub + fee;

  const [nameEn, addressEn, notesEn] = await Promise.all([
    translateToEn(name),
    translateToEn(address),
    translateToEn(notes)
  ]);

  let arInfo = 'الاسم: ' + name + '\n';
  if (deliveryMode === 'delivery') arInfo += 'الجوال: ' + phone + '\nالحي: ' + area + '\nالعنوان: ' + address + '\nنوع الطلب: توصيل\nرسوم التوصيل: ' + fee + ' ريال\n';
  else arInfo += 'نوع الطلب: استلام من المطعم\n';

  let enInfo = 'Name: ' + nameEn + '\n';
  if (deliveryMode === 'delivery') enInfo += 'Phone: ' + phone + '\nArea: ' + areaEn + '\nAddress: ' + addressEn + '\nOrder Type: Delivery\nDelivery Fee: ' + fee + ' SAR\n';
  else enInfo += 'Order Type: Pickup\n';

  const msg =
    '*طلب جديد - ساندويش حنيفة*\n' +
    '━━━━━━━━━━━━━━\n' +
    arInfo +
    '━━━━━━━━━━━━━━\n' +
    '*تفاصيل الطلب:*\n' +
    arLines +
    '*الإجمالي: ' + total + ' ريال*\n' +
    (notes ? '━━━━━━━━━━━━━━\nملاحظات عامة: ' + notes + '\n' : '') +
    '━━━━━━━━━━━━━━\n' +
    '*New Order - Hanifa Sandwich*\n' +
    '━━━━━━━━━━━━━━\n' +
    enInfo +
    '━━━━━━━━━━━━━━\n' +
    '*Order Details:*\n' +
    enLines +
    '*Total: ' + total + ' SAR*\n' +
    (notesEn ? '━━━━━━━━━━━━━━\nGeneral Notes: ' + notesEn + '\n' : '') +
    '━━━━━━━━━━━━━━\n' +
    'Thank you! شكراً لطلبك';

  const url = 'https://wa.me/' + PHONE + '?text=' + encodeURIComponent(msg);
  const a   = document.createElement('a');
  a.href    = url;
  a.target  = '_blank';
  a.rel     = 'noopener noreferrer';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function showToast(m, duration=2800) {
  const t = document.getElementById('toast');
  t.textContent = m;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

renderTabs();
renderMenu();
renderSummary();
</script>
